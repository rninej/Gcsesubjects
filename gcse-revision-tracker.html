<meta charset="UTF-8">

<title>GCSE Revision Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0f;
    --surface: #16161a;
    --surface2: #1e1e24;
    --border: #2a2a35;
    --text: #e8e8f0;
    --muted: #6b6b7d;
    --bio: #4ade80;
    --bio-dim: #1a3a24;
    --chem: #f87171;
    --chem-dim: #3a1a1a;
    --phys: #60a5fa;
    --phys-dim: #1a2a3a;
    --math: #fb923c;
    --math-dim: #3a2010;
    --bus: #a78bfa;
    --bus-dim: #251a3a;
    --comp: #22d3ee;
    --comp-dim: #0a2a30;
    --elit: #f9a8d4;
    --elit-dim: #3a1a28;
    --elang: #fde68a;
    --elang-dim: #3a3010;
    --geo: #86efac;
    --geo-dim: #1a3020;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HEADER */
  header {
    padding: 40px 48px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 100;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.5rem;
    letter-spacing: -0.03em;
    color: var(--text);
  }

  .logo span { color: var(--muted); }

  .global-progress {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .global-progress-text {
    font-size: 0.85rem;
    color: var(--muted);
    font-weight: 500;
  }

  .global-bar-wrap {
    width: 180px;
    height: 6px;
    background: var(--surface2);
    border-radius: 99px;
    overflow: hidden;
  }

  .global-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #4ade80, #60a5fa, #f87171);
    border-radius: 99px;
    transition: width 0.4s ease;
  }

  /* HOME */
  #home {
    padding: 64px 48px;
  }

  .home-title {
    font-family: 'Syne', sans-serif;
    font-size: clamp(2.5rem, 5vw, 4rem);
    font-weight: 800;
    letter-spacing: -0.04em;
    line-height: 1.05;
    margin-bottom: 12px;
  }

  .home-sub {
    color: var(--muted);
    font-size: 1.05rem;
    margin-bottom: 56px;
  }

  .subjects-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 20px;
  }

  .subject-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    cursor: pointer;
    transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
    position: relative;
    overflow: hidden;
  }

  .subject-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--accent);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .subject-card:hover { transform: translateY(-3px); box-shadow: 0 12px 40px rgba(0,0,0,0.4); }
  .subject-card:hover::before { opacity: 1; }
  .subject-card:hover { border-color: var(--accent); }

  .subject-card.coming-soon {
    opacity: 0.45;
    cursor: default;
  }

  .subject-card.coming-soon:hover {
    transform: none;
    box-shadow: none;
    border-color: var(--border);
  }

  .card-icon {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.4rem;
    margin-bottom: 18px;
    background: var(--accent-dim);
  }

  .card-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 1.2rem;
    margin-bottom: 4px;
    color: var(--accent);
  }

  .card-subtitle {
    font-size: 0.82rem;
    color: var(--muted);
    margin-bottom: 20px;
  }

  .card-progress-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .card-bar {
    flex: 1;
    height: 5px;
    background: var(--surface2);
    border-radius: 99px;
    overflow: hidden;
  }

  .card-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 99px;
    transition: width 0.4s ease;
  }

  .card-pct {
    font-size: 0.78rem;
    color: var(--muted);
    min-width: 35px;
    text-align: right;
  }

  .soon-badge {
    display: inline-block;
    margin-top: 12px;
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    background: var(--surface2);
    padding: 3px 10px;
    border-radius: 99px;
  }

  /* SUBJECT PAGE */
  #subject-page {
    display: none;
    padding: 0 48px 80px;
  }

  .subject-page-header {
    padding: 36px 0 32px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 40px;
  }

  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 0.85rem;
    color: var(--muted);
    cursor: pointer;
    transition: color 0.15s;
    margin-bottom: 20px;
    background: none;
    border: none;
    font-family: inherit;
  }

  .back-btn:hover { color: var(--text); }

  .subject-page-title {
    font-family: 'Syne', sans-serif;
    font-size: 2.8rem;
    font-weight: 800;
    letter-spacing: -0.04em;
    color: var(--s-accent);
  }

  .subject-page-meta {
    display: flex;
    align-items: center;
    gap: 24px;
    margin-top: 12px;
  }

  .subject-page-count {
    font-size: 0.85rem;
    color: var(--muted);
  }

  .subject-page-progress {
    display: flex;
    align-items: center;
    gap: 10px;
    flex: 1;
    max-width: 300px;
  }

  .subject-page-bar {
    flex: 1;
    height: 6px;
    background: var(--surface2);
    border-radius: 99px;
    overflow: hidden;
  }

  .subject-page-bar-fill {
    height: 100%;
    background: var(--s-accent);
    border-radius: 99px;
    transition: width 0.4s ease;
  }

  .subject-page-pct {
    font-size: 0.85rem;
    color: var(--s-accent);
    font-weight: 600;
    min-width: 40px;
  }

  .clear-btn {
    margin-left: auto;
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 6px 16px;
    border-radius: 8px;
    font-size: 0.8rem;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }

  .clear-btn:hover { border-color: var(--muted); color: var(--text); }

  /* CHAPTERS */
  .chapters-list { display: flex; flex-direction: column; gap: 24px; }

  .chapter-block {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
  }

  .chapter-header {
    display: flex;
    align-items: center;
    padding: 18px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
    gap: 12px;
    cursor: pointer;
    user-select: none;
  }

  .chapter-header:hover { background: #22222a; }

  .chapter-name {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    flex: 1;
    color: var(--s-accent);
  }

  .chapter-count {
    font-size: 0.78rem;
    color: var(--muted);
  }

  .chapter-chevron {
    color: var(--muted);
    transition: transform 0.2s;
    font-size: 0.75rem;
  }

  .chapter-block.collapsed .chapter-chevron { transform: rotate(-90deg); }
  .chapter-block.collapsed .topics-list { display: none; }

  .topics-list { padding: 8px 0; }

  .topic-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 11px 24px;
    cursor: pointer;
    transition: background 0.12s;
    border-bottom: 1px solid transparent;
  }

  .topic-item:hover { background: rgba(255,255,255,0.03); }

  .topic-item:last-child { border-bottom: none; }

  .topic-check {
    width: 20px;
    height: 20px;
    border-radius: 6px;
    border: 1.5px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.15s;
    background: transparent;
  }

  .topic-item.done .topic-check {
    background: var(--s-accent);
    border-color: var(--s-accent);
  }

  .topic-check svg { display: none; }
  .topic-item.done .topic-check svg { display: block; }

  .topic-label {
    flex: 1;
    font-size: 0.9rem;
    color: var(--text);
    transition: color 0.15s;
  }

  .topic-item.done .topic-label {
    color: var(--muted);
    text-decoration: line-through;
    text-decoration-color: var(--muted);
  }

  .topic-code {
    font-size: 0.75rem;
    color: var(--muted);
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    min-width: 48px;
    text-align: right;
  }

  .topic-page {
    font-size: 0.75rem;
    color: var(--muted);
    min-width: 40px;
    text-align: right;
  }

  /* Animations */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .chapter-block { animation: fadeIn 0.3s ease both; }
  .chapter-block:nth-child(1) { animation-delay: 0.05s; }
  .chapter-block:nth-child(2) { animation-delay: 0.1s; }
  .chapter-block:nth-child(3) { animation-delay: 0.15s; }
  .chapter-block:nth-child(4) { animation-delay: 0.2s; }
  .chapter-block:nth-child(5) { animation-delay: 0.25s; }
  .chapter-block:nth-child(6) { animation-delay: 0.3s; }
  .chapter-block:nth-child(7) { animation-delay: 0.35s; }
  .chapter-block:nth-child(8) { animation-delay: 0.4s; }

  @media (max-width: 700px) {
    header { padding: 20px 20px; }
    #home { padding: 40px 20px; }
    #subject-page { padding: 0 20px 60px; }
    .home-title { font-size: 2rem; }
    .global-bar-wrap { width: 100px; }
  }
</style>
</head>

  <div class="chapters-list" id="chapters-list"></div>
</div>

// ===================== COOKIES =====================
function getCookieData() {
  const match = document.cookie.match(/gcse_tracker=([^;]+)/);
  if (!match) return {};
  try { return JSON.parse(decodeURIComponent(match[1])); } catch { return {}; }
}

function saveCookieData(data) {
  const exp = new Date();
  exp.setFullYear(exp.getFullYear() + 2);
  document.cookie = `gcse_tracker=${encodeURIComponent(JSON.stringify(data))}; expires=${exp.toUTCString()}; path=/; SameSite=Lax`;
}

let cookieData = getCookieData();

function isTopicDone(subjectId, topicKey) {
  return !!(cookieData[subjectId] && cookieData[subjectId][topicKey]);
}

function setTopicDone(subjectId, topicKey, val) {
  if (!cookieData[subjectId]) cookieData[subjectId] = {};
  if (val) cookieData[subjectId][topicKey] = 1;
  else delete cookieData[subjectId][topicKey];
  saveCookieData(cookieData);
}

function getTopicKey(chIdx, tIdx) { return `${chIdx}_${tIdx}`; }

// ===================== PROGRESS =====================
function subjectProgress(subjectId) {
  const sub = SUBJECTS.find(s => s.id === subjectId);
  if (!sub || !sub.chapters.length) return { done: 0, total: 0 };
  let done = 0, total = 0;
  sub.chapters.forEach((ch, ci) => ch.topics.forEach((_, ti) => {
    total++;
    if (isTopicDone(subjectId, getTopicKey(ci, ti))) done++;
  }));
  return { done, total };
}

function globalProgress() {
  let done = 0, total = 0;
  SUBJECTS.filter(s => !s.comingSoon).forEach(s => {
    const p = subjectProgress(s.id);
    done += p.done; total += p.total;
  });
  return { done, total };
}

function updateGlobalBar() {
  const { done, total } = globalProgress();
  const pct = total ? Math.round(done / total * 100) : 0;
  document.getElementById('global-bar').style.width = pct + '%';
  document.getElementById('global-text').textContent = `${done} / ${total} topics`;
}

// ===================== HOME =====================
function renderHome() {
  const grid = document.getElementById('subjects-grid');
  grid.innerHTML = '';
  SUBJECTS.forEach(sub => {
    const { done, total } = subjectProgress(sub.id);
    const pct = total ? Math.round(done / total * 100) : 0;
    const card = document.createElement('div');
    card.className = 'subject-card' + (sub.comingSoon ? ' coming-soon' : '');
    card.style.setProperty('--accent', sub.accent);
    card.style.setProperty('--accent-dim', sub.accentDim);
    card.innerHTML = `
      <div class="card-icon">${sub.icon}</div>
      <div class="card-title">${sub.name}</div>
      <div class="card-subtitle">${sub.subtitle}</div>
      ${sub.comingSoon ? `<span class="soon-badge">Coming soon</span>` : `
        <div class="card-progress-wrap">
          <div class="card-bar"><div class="card-bar-fill" style="width:${pct}%"></div></div>
          <div class="card-pct">${pct}%</div>
        </div>
      `}
    `;
    if (!sub.comingSoon) card.onclick = () => openSubject(sub.id);
    grid.appendChild(card);
  });
  updateGlobalBar();
}

// ===================== SUBJECT PAGE =====================
let currentSubjectId = null;

function openSubject(id) {
  currentSubjectId = id;
  const sub = SUBJECTS.find(s => s.id === id);
  document.getElementById('home').style.display = 'none';
  const sp = document.getElementById('subject-page');
  sp.style.display = 'block';
  sp.style.setProperty('--s-accent', sub.accent);

  document.getElementById('sp-title').textContent = sub.name;
  renderSubjectPage(sub);
  updateSubjectProgress(sub);
}

function goHome() {
  document.getElementById('subject-page').style.display = 'none';
  document.getElementById('home').style.display = 'block';
  currentSubjectId = null;
  renderHome();
}

function renderSubjectPage(sub) {
  const list = document.getElementById('chapters-list');
  list.innerHTML = '';
  sub.chapters.forEach((ch, ci) => {
    const block = document.createElement('div');
    block.className = 'chapter-block';
    block.id = `ch-${ci}`;

    const doneCh = ch.topics.filter((_, ti) => isTopicDone(sub.id, getTopicKey(ci, ti))).length;

    block.innerHTML = `
      <div class="chapter-header" onclick="toggleChapter(${ci})">
        <div class="chapter-name">${ch.name}</div>
        <div class="chapter-count">${doneCh}/${ch.topics.length}</div>
        <div class="chapter-chevron">▾</div>
      </div>
      <div class="topics-list" id="tl-${ci}">
        ${ch.topics.map((t, ti) => {
          const done = isTopicDone(sub.id, getTopicKey(ci, ti));
          return `
            <div class="topic-item${done ? ' done' : ''}" id="ti-${ci}-${ti}" onclick="toggleTopic('${sub.id}', ${ci}, ${ti})">
              <div class="topic-check">
                <svg width="11" height="9" viewBox="0 0 11 9" fill="none">
                  <path d="M1 4L4 7L10 1" stroke="#0d0d0f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </div>
              <div class="topic-label">${t.label}</div>
              ${t.code ? `<div class="topic-code">${t.code}</div>` : ''}
              ${t.page ? `<div class="topic-page">p.${t.page}</div>` : ''}
            </div>
          `;
        }).join('')}
      </div>
    `;
    list.appendChild(block);
  });
}

function toggleChapter(ci) {
  document.getElementById(`ch-${ci}`).classList.toggle('collapsed');
}

function toggleTopic(subjectId, ci, ti) {
  const key = getTopicKey(ci, ti);
  const newVal = !isTopicDone(subjectId, key);
  setTopicDone(subjectId, key, newVal);

  const item = document.getElementById(`ti-${ci}-${ti}`);
  item.classList.toggle('done', newVal);

  // update chapter count
  const sub = SUBJECTS.find(s => s.id === subjectId);
  const ch = sub.chapters[ci];
  const doneCh = ch.topics.filter((_, i) => isTopicDone(subjectId, getTopicKey(ci, i))).length;
  document.querySelector(`#ch-${ci} .chapter-count`).textContent = `${doneCh}/${ch.topics.length}`;

  updateSubjectProgress(sub);
  updateGlobalBar();
}

function updateSubjectProgress(sub) {
  const { done, total } = subjectProgress(sub.id);
  const pct = total ? Math.round(done / total * 100) : 0;
  document.getElementById('sp-count').textContent = `${done} of ${total} topics complete`;
  document.getElementById('sp-bar').style.width = pct + '%';
  document.getElementById('sp-pct').textContent = pct + '%';
}

function clearSubject() {
  if (!currentSubjectId) return;
  if (!confirm('Clear all ticks for this subject?')) return;
  cookieData[currentSubjectId] = {};
  saveCookieData(cookieData);
  const sub = SUBJECTS.find(s => s.id === currentSubjectId);
  renderSubjectPage(sub);
  updateSubjectProgress(sub);
  updateGlobalBar();
}

// ===================== INIT =====================
renderHome();
